<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Bake</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="matrix"></canvas>

  <main class="screen">
    <section class="slide active">
      <p class="mini">SYSTEM BOOTING...</p>
      <h1>ACCESS GRANTED</h1>
    </section>

    <section class="slide">
      <p class="mini">Searching for...</p>
      <h1>BAKE</h1>
      <p class="msg">user found ❤</p>
    </section>

    <section class="slide">
      <p class="mini">Level Up!</p>
      <h1>19 ➜ 20</h1>
      <p class="msg">new chapter unlocked</p>
    </section>

    <section class="slide">
      <div class="heart">❤</div>
      <h1>HAPPY BIRTHDAY</h1>
      <h2>BAKE</h2>
    </section>

    <section class="slide">
      <h1>20 YEARS</h1>
      <p class="msg">of being amazing ✨</p>
      <p class="msg">hope this little detail makes you smile.</p>
    </section>

    <section class="slide">
      <h1>You unlocked:</h1>
      <p class="reward">∞ smiles</p>
      <p class="reward">∞ memories</p>
      <p class="reward">∞ adventures</p>
      <div class="small-heart">❤</div>
    </section>
  </main>

  <button id="start">Toca para iniciar</button>

  <script src="script.js"></script>
</body>
</html>
